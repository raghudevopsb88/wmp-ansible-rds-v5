- name: Install Golang
  ansible.builtin.dnf:
    name: golang
    state: present

- name: Include pre-reqs
  ansible.builtin.include_role:
    name: common
    tasks_from: pre-reqs

- name: Build application
  ansible.builtin.shell: |
    env >/tmp/env
    id >> /tmp/env
    bash -c "CGO_ENABLED=0 go build -o auth-service ./cmd/server"
  args:
    chdir: /app
  environment:
    GOPATH: /root/go
    GOMODCACHE: /root/go/pkg/mod
    PATH: "/usr/local/go/bin:/root/go/bin:{{ ansible_env.PATH }}"

- name: Include systemd
  ansible.builtin.include_role:
    name: common
    tasks_from: systemd
